name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, test, and smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Compile local binary
        run: pnpm attention:build

      - name: Smoke test local binary
        run: |
          set -euo pipefail
          export ATTENTION_HOME="$(mktemp -d)"
          export ATTENTION_API_PORT=4599
          ./dist-bin/attention start &
          pid="$!"
          trap 'kill "$pid" 2>/dev/null || true' EXIT
          for _ in $(seq 1 50); do
            if curl --fail --silent "http://127.0.0.1:${ATTENTION_API_PORT}/api/status" >/tmp/attention-status.json; then
              break
            fi
            sleep 0.2
          done
          cat /tmp/attention-status.json
          grep '"ok":true' /tmp/attention-status.json
          grep '"schemaVersion":11' /tmp/attention-status.json
